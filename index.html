<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Isna</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#050814;
color:white;
overflow-x:hidden;
}

/* CANVAS BACKGROUND */

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* INTRO */

.center{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
padding:20px;
}

/* SECTION */

.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
text-align:center;
padding:90px 40px;
}

/* BUTTON */

button{
padding:14px 28px;
border:none;
border-radius:30px;
background:#ff4b6e;
color:white;
font-size:16px;
cursor:pointer;
}

.nextBtn{
margin-top:40px;
background:#ff7a8f;
display:none;
}

/* TEXT */

.typing{
font-size:22px;
max-width:650px;
line-height:1.7;
}

/* GALLERY */

.gallery img{
width:230px;
border-radius:20px;
margin:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.chat{
background:#1e2a38;
padding:15px 20px;
border-radius:15px;
margin:10px;
max-width:500px;
}

/* CONFETTI */

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.popupContent{
background:#1e2a38;
padding:30px;
border-radius:15px;
text-align:center;
width:90%;
max-width:400px;
}

textarea{
width:100%;
height:100px;
margin-top:15px;
border-radius:10px;
border:none;
padding:10px;
}

/* BUTTON AREA */

.popupButtons{
margin-top:15px;
display:flex;
gap:10px;
justify-content:center;
}

</style>
</head>

<body>

<canvas id="sky"></canvas>
<canvas id="fireworks"></canvas>

<audio id="musik" loop>
<source src="Chintya Gabriella Panjang Umur.mp3">
</audio>

<div class="center" id="intro">

<h1>Hai Isna</h1>
<p>Ada sesuatu yang ingin aku sampaikan hari ini.</p>

<button onclick="mulai()">Buka</button>

</div>


<div id="content" style="display:none">

<div class="section">
<p class="typing" id="text1"></p>
<button class="nextBtn" onclick="nextSection(this)">Lanjut ↓</button>
</div>


<div class="section">

<div class="chat">Aku masih ingat waktu pertama kita sering chat.</div>
<div class="chat">Obrolan sederhana… tapi entah kenapa selalu terasa menyenangkan.</div>

<button class="nextBtn" onclick="nextSection(this)" style="display:block">
Lanjut ↓
</button>

</div>


<div class="section">

<h2>Beberapa Senyummu</h2>

<div class="gallery">
<img src="foto1.png">
<img src="foto2.png">
<img src="foto3.png">
<img src="foto4.png">
</div>

<button class="nextBtn" onclick="nextSection(this)" style="display:block">
Lanjut ↓
</button>

</div>


<div class="section">

<p class="typing" id="text2"></p>

<button class="nextBtn" onclick="nextSection(this)">Lanjut ↓</button>

</div>


<div class="section">

<h2>Untuk Bapakmu</h2>

<img src="ayah.png" style="width:260px;border-radius:20px">

<p class="typing" id="text3"></p>

<button class="nextBtn" onclick="nextSection(this)">Lanjut ↓</button>

</div>


<div class="section">

<h2>Kalian</h2>

<img src="isna_ayah.png" style="width:260px;border-radius:20px">

<p class="typing" id="text5"></p>

<button class="nextBtn" onclick="nextSection(this)">Lanjut ↓</button>

</div>


<div class="section">

<h1>🎂Selamat Ulang Tahun ke 23 Isna🎂</h1>

<img src="ayah_cake.png" style="width:260px;border-radius:20px">

<p class="typing" id="text4"></p>

<button class="nextBtn" onclick="showPopup()">Selesai</button>

</div>

</div>


<div class="popup" id="popup">

<div class="popupContent">

<h3>Ada yang mau disampaikan ke aku gk nih?</h3>

<div id="pilihan">
<button onclick="showInput()">Iya</button>
<button onclick="closePopup()">Tidak</button>
</div>

<div id="inputPesan" style="display:none">

<textarea id="pesan"></textarea>

<div class="popupButtons">
<button onclick="kirimWA()">Kirim</button>
<button onclick="batalPesan()">Batal</button>
</div>

</div>

</div>

</div>


<script>

/* TEXT */

const texts={
text1:"Hari ini bukan cuma tentang ulang tahunmu. Tapi tentang semua perjalanan yang sudah kamu lewati.",
text2:"Aku tahu ada masa dimana kamu sangat merindukan seseorang yang sangat penting di hidupmu.",
text3:"Mungkin sekarang beliau tidak ada di sini. Tapi aku yakin beliau selalu melihatmu dari tempat yang indah. Dan selalu bangga dengan anaknya.",
text4:"Semoga hidupmu pelan-pelan menjadi lebih ringan. Semoga semua kesedihan diganti dengan kebahagiaan. Terima kasih sudah pernah hadir di hidupku.",
text5:"Kenangan tidak pernah benar-benar hilang. Ia hanya berubah menjadi sesuatu yang selalu hidup di hati."
}

let typed={}
let fireworksStarted=false

function mulai(){

document.getElementById("intro").style.display="none"
document.getElementById("content").style.display="block"

document.getElementById("musik").play()

observeSections()

}

/* OBSERVER */

function observeSections(){

const observer=new IntersectionObserver((entries)=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

let el=entry.target.querySelector(".typing")

if(el && !typed[el.id]){

typing(el.id,texts[el.id])
typed[el.id]=true

if(el.id==="text1" && !fireworksStarted){
startFireworks()
fireworksStarted=true
}

if(el.id==="text4"){
confetti()
}

}

}

})

},{threshold:0.6})

document.querySelectorAll(".section").forEach(sec=>{
observer.observe(sec)
})

}

/* TYPING */

function typing(id,text){

let i=0
let el=document.getElementById(id)

function ketik(){

if(i<text.length){
el.innerHTML+=text.charAt(i)
i++
setTimeout(ketik,40)
}else{
let btn=el.parentElement.querySelector(".nextBtn")
if(btn) btn.style.display="block"
}

}

ketik()

}

/* SCROLL */

function nextSection(btn){

let next=btn.parentElement.nextElementSibling

if(next){
window.scrollTo({
top:next.offsetTop,
behavior:"smooth"
})
}

}

/* POPUP */

function showPopup(){
document.getElementById("popup").style.display="flex"
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

function showInput(){
document.getElementById("pilihan").style.display="none"
document.getElementById("inputPesan").style.display="block"
}

function batalPesan(){

document.getElementById("inputPesan").style.display="none"
document.getElementById("pilihan").style.display="block"

}

/* WA */

function kirimWA(){

let pesan=document.getElementById("pesan").value
let nomor="6282324027386"

let url=`https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`
window.open(url)

}

/* CONFETTI */

function confetti(){

for(let i=0;i<120;i++){

let conf=document.createElement("div")

conf.className="confetti"
conf.style.left=Math.random()*100+"%"
conf.style.background="hsl("+Math.random()*360+",100%,50%)"
conf.style.animationDuration=(3+Math.random()*5)+"s"

document.body.appendChild(conf)

}

}

/* SKY STARS */

const sky=document.getElementById("sky")
const sctx=sky.getContext("2d")

sky.width=window.innerWidth
sky.height=window.innerHeight

let stars=[]

for(let i=0;i<200;i++){
stars.push({
x:Math.random()*sky.width,
y:Math.random()*sky.height,
r:Math.random()*1.5
})
}

function drawStars(){

sctx.clearRect(0,0,sky.width,sky.height)

stars.forEach(star=>{
sctx.fillStyle="white"
sctx.beginPath()
sctx.arc(star.x,star.y,star.r,0,Math.PI*2)
sctx.fill()
})

requestAnimationFrame(drawStars)

}

drawStars()

/* SHOOTING STAR */

setInterval(()=>{

let x=Math.random()*sky.width
let y=Math.random()*sky.height/2

let len=300

let grad=sctx.createLinearGradient(x,y,x+len,y+len)

grad.addColorStop(0,"white")
grad.addColorStop(1,"transparent")

sctx.strokeStyle=grad
sctx.lineWidth=2

sctx.beginPath()
sctx.moveTo(x,y)
sctx.lineTo(x+len,y+len)
sctx.stroke()

},5000)

/* FIREWORKS */

function startFireworks(){

const canvas=document.getElementById("fireworks")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function firework(){

let x=Math.random()*canvas.width
let y=Math.random()*canvas.height*0.5

for(let i=0;i<70;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:100,
color:`hsl(${Math.random()*360},100%,60%)`
})

}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{

p.x+=p.vx
p.y+=p.vy
p.life--

ctx.fillStyle=p.color
ctx.fillRect(p.x,p.y,3,3)

if(p.life<=0){
particles.splice(i,1)
}

})

requestAnimationFrame(animate)

}

setInterval(()=>{
firework()
firework()
firework()
},1200)

animate()

}

</script>

</body>
</html>
